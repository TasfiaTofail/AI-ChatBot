<!DOCTYPE html>
<html>
<head>
    <title>Sci-Fi AI Chatbot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 🌌 Full screen space background */
        body {
            height: 100vh;
            overflow: hidden;

            background: url("https://www.nhm.ac.uk/content/dam/nhm-www/discover/what-is-space/what-is-space-milky-way-full-width.jpg.thumb.1280.1280.png") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* dark overlay like sci-fi UI */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
        }


        /* 💬 main chat glass box */
        .chat-wrapper {
            width: 420px;
            height: 650px;

            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);

            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;

            display: flex;
            flex-direction: column;

            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            z-index: 2;
        }

        /* header */
        .header {
            padding: 15px;
            text-align: center;
            color: white;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
        }

        /* chat messages */
        #chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 12px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            animation: fade 0.2s ease-in;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* input area */
        .input-area {
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

    </style>
</head>

<body>

<div class="chat-wrapper">

    <div class="header">
        🤖 AI Chatbot
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let message = input.value;

    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    // user message
    let userDiv = document.createElement("div");
    userDiv.className = "msg user";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    input.value = "";

    // bot placeholder
    let botDiv = document.createElement("div");
    botDiv.className = "msg bot";
    botDiv.innerText = "Thinking...";
    chatBox.appendChild(botDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    let data = await res.json();
    botDiv.innerText = data.reply;

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
